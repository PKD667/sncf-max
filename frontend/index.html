<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>TGV MAX</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9/dist/leaflet.css">
<link rel="icon" href="https://unsuspicious.org/graphics/favicon.jpg">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="map"></div>
<div id="side">
<h1>TGV <span>//</span> <em>MAX</em><img src="https://unsuspicious.org/graphics/short.png" alt="USI"></h1>

<div class="box">
<h2>SEARCH</h2>
<form onsubmit="search();return false">
<div class="row">
<select name="origin"></select>
<select name="destination"></select>
<input type="date" name="date">
<button type="submit" class="prim">GO</button>
<button type="button" onclick="hunt()">HUNT</button>
</div>
<div class="row" style="margin-top:3px">
<input type="text" name="dep_after" placeholder="dep after (HH:MM)" style="width:115px">
<input type="text" name="arr_before" placeholder="arr before (HH:MM)" style="width:115px">
</div></form>
<div class="row" style="margin-top:3px"><span id="st" style="font-size:10px;color:var(--dim)"></span></div>
</div>

<div class="box" id="detail" style="display:none"><h2>DETAIL <span style="color:var(--dim);cursor:pointer" onclick="hideDetail()">[x]</span></h2><div id="dt"></div></div>
<div class="box" id="sum" style="display:none"><h2>SUMMARY</h2><div id="sc"></div></div>

<div class="box" id="directBox" style="display:none"><h2>DIRECT <span style="color:var(--g)">MAX</span> <span id="fc" style="color:var(--dim)"></span></h2><div id="fl"></div></div>
<div class="box" id="detourBox" style="display:none"><h2>DETOUR <span style="color:var(--g)">MAX</span> <span id="dtourc" style="color:var(--dim)"></span></h2><div id="dl"></div></div>
<div class="box" id="payantBox" style="display:none"><h2>PAYANT <span style="color:var(--y)">DIRECT</span> <span id="pc" style="color:var(--dim)"></span></h2><div id="pl"></div></div>
<div class="box" id="detourPayBox" style="display:none"><h2>DETOUR <span style="color:var(--y)">PAYANT</span> <span id="dpc" style="color:var(--dim)"></span></h2><div id="dpl"></div></div>

<div style="text-align:center;padding:12px;color:var(--dim);font-size:10px;border-top:1px solid var(--border);margin-top:8px">
made with love by <a href="https://unsuspicious.org" style="color:var(--b);text-decoration:none">pkd</a>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9/dist/leaflet.js" onerror="console.log('map CDN unavailable')"></script>
<script src="/app.js"></script>
</body>
</html>
